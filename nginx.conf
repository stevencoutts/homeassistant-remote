server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Hashed, content-addressed assets never change — cache hard.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA control files must always be revalidated so updates land.
    location = /sw.js               { add_header Cache-Control "no-cache"; }
    location = /service-worker.js   { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # SPA: serve index.html for any unmatched path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
